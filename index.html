<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Bedrock Packs</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #020617;
  font-size: 24px;
  font-weight: bold;
}

.search-box {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  display: block;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 15px;
  padding: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.title {
  font-size: 18px;
  margin: 10px 0;
}

.desc {
  font-size: 14px;
  opacity: 0.8;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<header>🔥 Minecraft Bedrock Packs</header>

<input type="text" id="search" class="search-box" placeholder="Search packs...">

<div class="container" id="packContainer"></div>

<script>
// ===== PACK DATA (EDIT LINKS HERE) =====
const packs = [
  {
    name: "3D Crystal Pack",
    desc: "Clean 3D crystals for PvP",
    img: "https://via.placeholder.com/300x150",
    link: "https://example.com/pack1.mcpack"
  },
  {
    name: "Small Swords Pack",
    desc: "Better PvP visibility",
    img: "https://via.placeholder.com/300x150",
    link: "https://example.com/pack2.mcpack"
  },
  {
    name: "FPS Boost Pack",
    desc: "Less lag, smoother gameplay",
    img: "https://via.placeholder.com/300x150",
    link: "https://example.com/pack3.mcpack"
  }
];

// ===== DISPLAY PACKS =====
function displayPacks(filteredPacks) {
  const container = document.getElementById("packContainer");
  container.innerHTML = "";

  if (filteredPacks.length === 0) {
    container.innerHTML = "<p style='text-align:center;'>No packs found.</p>";
    return;
  }

  filteredPacks.forEach(pack => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${pack.img}">
      <div class="title">${pack.name}</div>
      <div class="desc">${pack.desc}</div>
      <a href="${pack.link}" download>
        <button>Download</button>
      </a>
    `;

    container.appendChild(card);
  });
}

// ===== SEARCH FUNCTION =====
document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();

  const filtered = packs.filter(pack =>
    pack.name.toLowerCase().includes(value) ||
    pack.desc.toLowerCase().includes(value)
  );

  displayPacks(filtered);
});

// ===== LOAD ON START =====
displayPacks(packs);
</script>

</body>
</html>
