<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedrock Packs Hub</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

.search {
  display: flex;
  justify-content: center;
  margin: 20px;
}

.search input {
  width: 90%;
  max-width: 500px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 18px;
  padding: 15px;
  transition: 0.2s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  border-radius: 12px;
}

.name {
  font-size: 18px;
  margin: 10px 0;
}

.desc {
  font-size: 14px;
  opacity: 0.8;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<header>⚡ Bedrock Packs Hub</header>

<div class="search">
<input type="text" id="searchInput" placeholder="Search packs...">
</div>

<div class="grid" id="grid"></div>

<script>

// 🔥 IMPORTANT:
// Upload your file to the SAME repo as this HTML
// Rename it to something simple like:
// SmallSword.mcpack

const packs = [
  {
    name: "Small Swords PvP Pack",
    desc: "Better PvP visibility with smaller swords",
    img: "https://picsum.photos/300/150?1",
    link: "./SmallSword.mcpack"
  }
];

// duplicate to make site look full (same file for now)
while (packs.length < 50) {
  packs.push({
    name: packs[0].name + " v" + packs.length,
    desc: packs[0].desc,
    img: "https://picsum.photos/300/150?" + packs.length,
    link: packs[0].link
  });
}

// FORCE DOWNLOAD
function downloadFile(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = "";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// RENDER
function render(list) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.img}">
      <div class="name">${p.name}</div>
      <div class="desc">${p.desc}</div>
      <button onclick="downloadFile('${p.link}')">Download</button>
    `;

    grid.appendChild(div);
  });
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", function() {
  const val = this.value.toLowerCase();

  const filtered = packs.filter(p =>
    p.name.toLowerCase().includes(val)
  );

  render(filtered);
});

// LOAD
render(packs);

</script>

</body>
</html>
