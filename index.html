<style>
body {

<body>

<header>🔥 Best Minecraft Bedrock PvP Texture Packs</header>

<nav>
  <a href="#">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
</nav>

<div class="search-box">
  <input type="text" id="search" placeholder="Search packs...">
</div>

<div class="filters">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('fps')">FPS</button>
  <button onclick="filter('crystal')">Crystal</button>
  <button onclick="filter('bedwars')">Bedwars</button>
</div>

<div class="container" id="packs"></div>

<footer>
  © 2026 Minecraft PvP Packs | Not affiliated with Mojang
</footer>

<script>
const packs = [
  const packs = [
  {name:"Nebula 16x", type:"fps", link:"https://mcpedl.com/nebula-16x/"},
  {name:"Aether 32x", type:"crystal", link:"https://mcpedl.com/aether-32x/"},
  {name:"Midnight PvP", type:"fps", link:"https://mcpedl.com/midnight-pvp/"},
  {name:"Inferno 16x", type:"bedwars", link:"https://mcpedl.com/inferno-16x/"},
  {name:"Venom Pack", type:"crystal", link:"https://mcpedl.com/venom-pvp/"},
  {name:"Galaxy 32x", type:"fps", link:"https://mcpedl.com/galaxy-32x/"},
  {name:"Ruby PvP", type:"bedwars", link:"https://mcpedl.com/ruby-pvp/"},
  {name:"Shadow 16x", type:"fps", link:"https://mcpedl.com/shadow-16x/"},
  {name:"Aqua 32x", type:"crystal", link:"https://mcpedl.com/aqua-32x/"},
  {name:"Blaze Pack", type:"bedwars", link:"https://mcpedl.com/blaze-pvp/"}

];

function display(list) {
  const container = document.getElementById("packs");
  container.innerHTML = "";

  list.forEach(pack => {
    container.innerHTML += `
      <div class="card">
        <h3>${pack.name}</h3>
        <p>${pack.type.toUpperCase()} Pack</p>
        <a class="download" href="${pack.link}" target="_blank">Download</a>
      </div>
    `;
  });
}

function filter(type) {
  if (type === "all") return display(packs);
  display(packs.filter(p => p.type === type));
}

document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  display(packs.filter(p => p.name.toLowerCase().includes(value)));
});

display(packs);
</script>

</body>
