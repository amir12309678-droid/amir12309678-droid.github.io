<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedrock Packs Hub</title>

<!-- ICON -->
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

.search {
  display: flex;
  justify-content: center;
  margin: 20px;
}

.search input {
  width: 90%;
  max-width: 500px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 18px;
  padding: 15px;
  transition: 0.2s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  border-radius: 12px;
}

.name {
  font-size: 18px;
  margin: 10px 0;
}

.desc {
  font-size: 14px;
  opacity: 0.8;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<header>⚡ Bedrock Packs Hub</header>

<div class="search">
<input type="text" id="searchInput" placeholder="Search packs...">
</div>

<div class="grid" id="grid"></div>

<script>
// REAL WORKING FILE (REPLACE THIS WITH YOUR OWN FILE LATER)
const WORKING_LINK = "https://download1592.mediafire.com/examplefile/pack.mcpack";

// GENERATE 50+ PACKS
const packs = [];
for (let i = 1; i <= 60; i++) {
  packs.push({
    name: "PvP Pack " + i,
    desc: "Smooth FPS + clean PvP visuals",
    img: "https://picsum.photos/300/150?random=" + i,
    link: WORKING_LINK
  });
}

// DISPLAY
function render(list) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.img}">
      <div class="name">${p.name}</div>
      <div class="desc">${p.desc}</div>
      <a href="${p.link}" download>
        <button>Download</button>
      </a>
    `;

    grid.appendChild(div);
  });
}

// SEARCH (FORCED WORKING)
document.getElementById("searchInput").addEventListener("keyup", function() {
  const val = this.value.toLowerCase();

  const filtered = packs.filter(p =>
    p.name.toLowerCase().includes(val) ||
    p.desc.toLowerCase().includes(val)
  );

  render(filtered);
});

// LOAD
render(packs);
</script>

</body>
</html>
